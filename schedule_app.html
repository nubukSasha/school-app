<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій Розклад</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #4a90e2;
            --accent: #2ecc71;
            --nz-color: #ff9f43;
            --text: #333;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        html { scroll-behavior: smooth; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; padding-bottom: 30px; }

        .header { background: var(--card); padding: 15px; text-align: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: center; gap: 10px; }
        h1 { margin: 0; font-size: 1.3rem; color: var(--primary); }

        .btn-home { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: none; align-items: center; gap: 6px; background: none; border: none; font-size: 0.9rem; font-weight: 500; cursor: pointer; color: var(--primary); padding: 6px 12px; border-radius: 8px; transition: background 0.2s; }
        .btn-home:hover { background: rgba(74,144,226,0.1); }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        .mode-switch { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: #d0dbe5; font-weight: bold; cursor: pointer; color: #555; transition: 0.2s; font-size: 0.9rem; }
        .mode-btn.active { background: var(--primary); color: white; box-shadow: 0 2px 5px rgba(74,144,226,0.3); }

        .day-nav { display: none; position: fixed; right: 10px; top: 50%; transform: translateY(-50%); background: var(--card); padding: 10px 5px; border-radius: 15px; box-shadow: var(--shadow); z-index: 90; flex-direction: column; gap: 8px; }
        .day-nav-btn { background: #eee; border: none; border-radius: 8px; padding: 8px; font-size: 0.75rem; font-weight: bold; color: var(--primary); text-align: center; cursor: pointer; border: 1px solid transparent; }
        .day-nav-btn:active { background: var(--primary); color: white; }

        .page { display: none; }
        .active-page { display: block; }

        .card { background: var(--card); border-radius: 15px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 15px; border: 1px solid #e1e8ed; scroll-margin-top: 100px; }
        .card-title { font-size: 1.1rem; font-weight: 700; border-bottom: 2px solid var(--bg); padding-bottom: 10px; margin-bottom: 12px; color: var(--primary); }

        .call-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .call-item:last-child { border-bottom: none; }
        .call-num { font-weight: bold; color: var(--primary); width: 30px; }
        .call-time { font-family: monospace; font-size: 1.1rem; flex-grow: 1; text-align: center; }
        .call-break { font-size: 0.75rem; color: #888; white-space: nowrap; margin-left: 5px; }

        .main-nav-btns { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .big-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--card); color: var(--primary); font-size: 1rem; font-weight: bold; cursor: pointer; box-shadow: var(--shadow); border: 2px solid var(--primary); transition: 0.2s; text-decoration: none; text-align: center; display: block; }
        .big-btn:active { background: var(--primary); color: white; }
        .btn-nz-main { border-color: var(--nz-color); color: var(--nz-color); }
        .btn-nz-main:active { background: var(--nz-color); color: white; }

        /* Одиночний урок */
        .lesson-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f1f1; text-decoration: none; color: inherit; position: relative; }
        .lesson-item:last-child { border-bottom: none; }
        .l-time { font-size: 0.8rem; color: #777; min-width: 85px; font-family: monospace; }
        .l-subject { font-weight: 500; flex-grow: 1; padding-right: 25px; line-height: 1.3; }
        .l-icon { color: var(--accent); font-size: 1.1rem; position: absolute; right: 0; }

        /* Згрупований слот (кілька предметів в одному часовому блоці) */
        .lesson-group { display: flex; align-items: stretch; padding: 10px 0; border-bottom: 1px solid #f1f1f1; }
        .lesson-group:last-child { border-bottom: none; }
        .lesson-group .l-time { padding-top: 3px; flex-shrink: 0; }
        .lesson-group-subjects { flex-grow: 1; display: flex; flex-direction: column; gap: 0; }
        .lesson-group-subjects a { display: flex; align-items: center; text-decoration: none; color: inherit; padding: 4px 0; position: relative; }
        .lesson-group-subjects a:not(:last-child) { border-bottom: 1px dashed #e8e8e8; padding-bottom: 6px; margin-bottom: 2px; }
        .lesson-group-subjects .l-subject { font-weight: 500; flex-grow: 1; padding-right: 25px; line-height: 1.3; font-size: 0.95rem; }
        .lesson-group-subjects .l-icon { position: absolute; right: 0; top: 50%; transform: translateY(-50%); }
        .or-label { font-size: 0.68rem; color: #aaa; text-align: center; padding: 1px 0; font-style: italic; }

        .nz-tag { background: var(--nz-color); color: white; font-size: 0.68rem; padding: 3px 7px; border-radius: 5px; font-weight: bold; text-decoration: none; margin-left: 7px; white-space: nowrap; vertical-align: middle; display: inline-block; }
    </style>
</head>
<body>

<div class="header" style="position:sticky;">
    <button class="btn-home" id="btnHome" onclick="showPage('pageHome')">🏠 Назад</button>
    <h1>📚 Мій Розклад</h1>
</div>

<div class="day-nav" id="dayNav">
    <button class="day-nav-btn" onclick="scrollToDay('day-Понеділок')">Пн</button>
    <button class="day-nav-btn" onclick="scrollToDay('day-Вівторок')">Вт</button>
    <button class="day-nav-btn" onclick="scrollToDay('day-Середа')">Ср</button>
    <button class="day-nav-btn" onclick="scrollToDay('day-Четвер')">Чт</button>
    <button class="day-nav-btn" onclick="scrollToDay('day-П\'ятниця')">Пт</button>
</div>

<div class="container">

    <div id="pageHome" class="page active-page">
        <div class="card">
            <div class="card-title">🕒 Розклад дзвінків</div>
            <div class="call-item"><span class="call-num">1.</span><span class="call-time">12:30 – 13:05</span><span class="call-break">(10 хв)</span></div>
            <div class="call-item"><span class="call-num">2.</span><span class="call-time">13:15 – 13:50</span><span class="call-break">(20 хв)</span></div>
            <div class="call-item"><span class="call-num">3.</span><span class="call-time">14:10 – 14:45</span><span class="call-break">(20 хв)</span></div>
            <div class="call-item"><span class="call-num">4.</span><span class="call-time">15:05 – 15:40</span><span class="call-break">(10 хв)</span></div>
            <div class="call-item"><span class="call-num">5.</span><span class="call-time">15:50 – 16:25</span><span class="call-break">(10 хв)</span></div>
            <div class="call-item"><span class="call-num">6.</span><span class="call-time">16:35 – 17:10</span><span class="call-break">(10 хв)</span></div>
            <div class="call-item"><span class="call-num">7.</span><span class="call-time">17:20 – 17:55</span><span class="call-break">(10 хв)</span></div>
        </div>
        <div class="main-nav-btns">
            <button class="big-btn" onclick="openSchedule('distant')">💻 Дистанційний формат</button>
            <button class="big-btn" onclick="openSchedule('mixed')">🏫 Змішаний формат</button>
            <a href="https://nz.ua/" target="_blank" class="big-btn btn-nz-main">🌐 Нові знання (НЗ)</a>
            <button class="big-btn" onclick="showPage('pageBooks')">📚 Підручники</button>
        </div>
    </div>

    <div id="pageSchedule" class="page">
        <div class="mode-switch">
            <button class="mode-btn" id="btn-distant" onclick="switchMode('distant')">Дистанційний</button>
            <button class="mode-btn" id="btn-mixed" onclick="switchMode('mixed')">Змішаний</button>
        </div>
        <div id="scheduleContent"></div>
    </div>

    <div id="pageBooks" class="page">
        <div class="card">
            <div class="card-title">📚 Підручники</div>
            <div id="booksList"></div>
        </div>
    </div>

</div>

<script>
    const links = {
        "Українська мова": "https://us04web.zoom.us/j/5016290889?pwd=r3cXUOUhN21bguKGfZ63apOaubqa5E.1",
        "Українська література": "https://us04web.zoom.us/j/5016290889?pwd=r3cXUOUhN21bguKGfZ63apOaubqa5E.1",
        "Хімія": "https://us04web.zoom.us/j/3280515839?pwd=dU5CVm9xNjE0OGJCUWJ0NlZzSnBtQT09",
        "Алгебра": "https://nz.ua/",
        "Геометрія": "https://nz.ua/",
        "Математика": "https://nz.ua/",
        "Фізична культура": "https://us05web.zoom.us/j/2019944995?pwd=KG0qXLCNVCYqEDO7y0rdYRsaLnecIb.1",
        "Інформатика": "https://us05web.zoom.us/j/88529881707?pwd=Q0N3OUFjQ21rZkhqc1ZsZ1pVa0ZjQT09",
        "Географія": "https://us05web.zoom.us/j/82227369805?pwd=JPqON2o4Yc8pKXf7brbVRya9ySTOR9.1",
        "Німецька мова": "https://us05web.zoom.us/j/83850475288?pwd=dUlYU1hpNllzb0JUaDB3ZlRTSUY4QT09",
        "Історія України": "https://us04web.zoom.us/j/2104211325?pwd=TnJWTWZlTzFMTThEZk5JaDNGVUhxZz09",
        "Всесвітня історія": "https://us04web.zoom.us/j/2104211325?pwd=TnJWTWZlTzFMTThEZk5JaDNGVUhxZz09",
        "Фізика": "https://us04web.zoom.us/j/73229507847?pwd=jhqCQV4qEfic9RJtBewhL0rVm3DuOX.1",
        "Англійська мова": "https://us05web.zoom.us/j/2832249610?pwd=SllHa3gyZHZzZ25LTkR3eUdseEt3dz09",
        "Основи здоров'я": "https://us04web.zoom.us/j/2330497400?pwd=c1ovVEIrZkV3WklRWTIzWC9IUGZTZz09",
        "Технології": "https://us04web.zoom.us/j/2330497400?pwd=c1ovVEIrZkV3WklRWTIzWC9IUGZTZz09",
        "Зарубіжна література": "https://us05web.zoom.us/j/83568427323?pwd=TakRSbtb3Ia9ZWwkMje8RQBiI4gEli.1",
        "Біологія": "https://us04web.zoom.us/j/2914162042?pwd=zjgV8acP8N3G1yilmE7wa2jhDReGb5.1",
        "Драматургія": "https://us05web.zoom.us/j/2964415092?pwd=SEZYcGltOXFOUnd4cG15OTAvWnNNZz09",
        "Мистецтво": "https://us05web.zoom.us/j/5131985836?pwd=TFFZVnRJazZhSmFGa2ZxQ3BZOTlUQT09"
    };

    const times = ["1: 12:30-13:05","2: 13:15-13:50","3: 14:10-14:45","4: 15:05-15:40","5: 15:50-16:25","6: 16:35-17:10","7: 17:20-17:55"];

    const scheduleData = {
        distant: {
            "Понеділок": ["Історія України","Фінансова грамотність / Зарубіжна літ.","Біологія","Українська мова","Алгебра","Фізична культура",["Англійська мова (І)","Німецька мова (І)"]],
            "Вівторок": ["Фізика",["Англійська мова (І)","Німецька мова (І)"],"Геометрія","Географія","Хімія","Алгебра","Інформатика"],
            "Середа": ["Українська література","Всесвітня історія","Драматургія","Біологія","Фізика",["Англійська мова (ІІ)","Німецька мова (ІІ)"],"Зарубіжна література"],
            "Четвер": ["Географія",["Англійська мова (І)","Німецька мова (І)"],"Геометрія","Хімія","Фізична культура","Інформатика","Українська мова"],
            "П'ятниця": ["Технології / Основи здоров'я","Алгебра","Історія України","Українська мова","Українська література",["Англійська мова (ІІ)","Німецька мова (ІІ)"],"Мистецтво"]
        },
        mixed: {
            "Понеділок": ["Зарубіжна література","Українська мова","Історія України","Біологія",["Англійська мова (І)","Німецька мова (І)"],"Алгебра","Фізична культура"],
            "Вівторок": [["Англійська мова (І)","Німецька мова (І)"],"Геометрія","Фізика","Хімія","Алгебра","Фізична культура","Географія"],
            "Середа": ["Всесвітня історія","Зарубіжна література","Біологія","Драматургія","Українська література","Фізика",["Англійська мова (ІІ)","Німецька мова (ІІ)"]],
            "Четвер": [["Англійська мова (І)","Німецька мова (І)"],"Географія","Українська мова","Геометрія","Інформатика","Хімія","Фізична культура"],
            "П'ятниця": ["Алгебра","Українська мова","Технології / Основи здоров'я","Мистецтво","Історія України","Українська література",["Англійська мова (ІІ)","Німецька мова (ІІ)"]]
        }
    };

    const booksData = [
        { name: "Українська мова", url: "https://pidruchnyk.com.ua/2902-ukrainska-mova-zabolotnyi-8-klas-2025.html" },
        { name: "Українська література", url: "https://pidruchnyk.com.ua/2962-ukrainska-literatura-avramenko-8-klas-2025.html" },
        { name: "Інформатика", url: "https://shkola.in.ua/968-informatyka-8-klas-ryvkind-2016.html" },
        { name: "Німецька мова (перша)", url: "https://issuu.com/kreidaros/docs/_8_2025_8-_" },
        { name: "Німецька мова (друга)", url: "https://pidruchnyk.com.ua/2939-nimecka-mova-basai-8-klas-2025.html", extra: "https://issuu.com/kreidaros/docs/_8_2025_4-_" },
        { name: "Хімія", url: "https://drive.google.com/file/d/1Ly9sLp8gN5uN3MJSh3ydb0Ym6B3rI6ov/view" },
        { name: "Географія", url: "https://pidruchnyk.com.ua/2984-geografiia-gilberg-8-klas-2025.html" },
        { name: "Фізика", url: "https://share.google/GxLQ4r3zr5s56ajkn" },
        { name: "Мистецтво", url: "https://share.google/aNYjkPGLcMQjn5AW6" },
        { name: "Алгебра", url: "https://pidruchnyk.com.ua/2909-algebra-tarasenkova-8-klas-2025.html" },
        { name: "Геометрія", url: "https://pidruchnyk.com.ua/2915-geometriia-burda-8-klas-2025.html" },
        { name: "Англійська мова (1)", url: "https://online.flippingbook.com/view/102079583/" },
        { name: "Англійська мова (2)", url: "https://pidruchnyk.com.ua/2918-angliiska-mova-kuchma-8-klas-2025.html" },
        { name: "Всесвітня історія", url: "https://pidruchnyk.com.ua/2978-vsesvitnia-istoriia-gisem-8-klas-2025.html" },
        { name: "Історія України", url: "https://pidruchnyk.com.ua/3018-istoriia-ukrainy-galimov-8-klas-2025.html" },
        { name: "Біологія", url: "https://pidruchnyk.com.ua/2925-biologiia-balan-8-klas-2025.html" },
        { name: "Зарубіжна література", url: "https://pidruchnyk.com.ua/2991-zarubizhna-literatura-nikolenko-8-klas-2025.html" }
    ];

    function getLink(name) {
        for (let key in links) {
            if (name.includes(key)) return links[key];
        }
        return "#";
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        document.getElementById('btnHome').style.display = (pageId !== 'pageHome') ? 'flex' : 'none';
        document.getElementById('dayNav').style.display = (pageId === 'pageSchedule') ? 'flex' : 'none';
        if (pageId === 'pageHome') window.scrollTo(0, 0);
        if (pageId === 'pageBooks') renderBooks();
    }

    function openSchedule(mode) {
        showPage('pageSchedule');
        renderSchedule(mode);
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
    }

    function switchMode(mode) {
        renderSchedule(mode);
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
    }

    function scrollToDay(dayId) {
        const el = document.getElementById(dayId);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
    }

    function renderSchedule(mode) {
        const container = document.getElementById('scheduleContent');
        container.innerHTML = '';
        const data = scheduleData[mode];

        for (let day in data) {
            let html = `<div class="card" id="day-${day}"><div class="card-title">${day}</div>`;

            data[day].forEach((lesson, i) => {
                const time = times[i] || "";

                if (Array.isArray(lesson)) {
                    // Згрупований слот — один час, кілька варіантів
                    let subjectsHtml = '';
                    lesson.forEach((sub, si) => {
                        const link = getLink(sub);
                        const isNZ = link === "https://nz.ua/";
                        const isValid = link !== "#";
                        if (si > 0) subjectsHtml += `<div class="or-label">або</div>`;
                        subjectsHtml += `
                            <a href="${link}" ${isValid ? 'target="_blank"' : 'onclick="return false;"'}>
                                <span class="l-subject">
                                    ${sub}
                                    ${isNZ ? '<span class="nz-tag">НЗ</span>' : ''}
                                </span>
                                ${isValid && !isNZ ? '<span class="l-icon">🔗</span>' : ''}
                            </a>`;
                    });
                    html += `
                        <div class="lesson-group">
                            <span class="l-time">${time}</span>
                            <div class="lesson-group-subjects">${subjectsHtml}</div>
                        </div>`;
                } else {
                    // Звичайний урок
                    const link = getLink(lesson);
                    const isNZ = link === "https://nz.ua/";
                    const isValid = link !== "#";
                    html += `
                        <a href="${link}" class="lesson-item" ${isValid ? 'target="_blank"' : 'onclick="return false;"'}>
                            <span class="l-time">${time}</span>
                            <span class="l-subject">
                                ${lesson}
                                ${isNZ ? '<span class="nz-tag">НЗ</span>' : ''}
                            </span>
                            ${isValid && !isNZ ? '<span class="l-icon">🔗</span>' : ''}
                        </a>`;
                }
            });

            html += `</div>`;
            container.innerHTML += html;
        }
    }

    function renderBooks() {
        const list = document.getElementById('booksList');
        list.innerHTML = '';
        booksData.forEach((book, i) => {
            let html = `
            <div class="lesson-item" style="flex-direction:column; align-items:flex-start; padding-right:0;">
                <a href="${book.url}" target="_blank" style="display:flex; width:100%; text-decoration:none; color:inherit; position:relative;">
                    <span class="call-num" style="width:35px;">${i+1}.</span>
                    <span class="l-subject">${book.name}</span>
                    <span class="l-icon">🔗</span>
                </a>`;
            if (book.extra) {
                html += `<a href="${book.extra}" target="_blank" style="margin-top:6px; margin-left:35px; font-size:0.85rem; color:var(--primary); text-decoration:none; font-weight:600;">Додатково: click 🔗</a>`;
            }
            html += `</div>`;
            list.innerHTML += html;
        });
    }
</script>
</body>
</html>
